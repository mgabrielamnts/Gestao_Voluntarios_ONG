<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Voluntário</title>
    <link rel="stylesheet" href="styleCADAS.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../Imagens/icone_logo.png" type="image/x-icon">
</head>
<body>
  <div class="container-principal">
      <h1 class="header-title">Registro de Voluntário</h1>
      <p class="subtitle">
          Preencha todos os campos obrigatórios (*) para completar seu cadastro no Grupo Amparo e Alívio.
      </p>

      <form id="voluntarioForm">

          <!-- SEÇÃO 1: DADOS PESSOAIS -->
          <div class="section">
              <h2>1. Dados Pessoais e Profissionais</h2>
              <div class="input-group">
                  <div class="form-group col-span-full">
                      <label for="nome">Nome Completo *</label>
                      <input type="text" id="nome" name="nome" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="profissao">Profissão *</label>
                      <input type="text" id="profissao" name="profissao" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="registro_conselho">Registro no Conselho (CRM, CRP etc.)</label>
                      <input type="text" id="registro_conselho" name="registro_conselho" class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="rg">RG *</label>
                      <input type="text" id="rg" name="rg" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="cpf">CPF *</label>
                      <input type="text" id="cpf" name="cpf" required class="input-field">
                  </div>
              </div>
          </div>

          <!-- SEÇÃO 2: CONTATOS -->
          <div class="section">
              <h2>2. Contatos</h2>
              <div class="input-group input-group-contact">
                  <div class="form-group">
                      <label for="telefone_pessoal">Telefone Pessoal (Celular) *</label>
                      <input type="tel" id="telefone_pessoal" name="telefone_pessoal" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="telefone_residencial">Telefone Residencial</label>
                      <input type="tel" id="telefone_residencial" name="telefone_residencial" class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="telefone_consultorio">Telefone do Consultório</label>
                      <input type="tel" id="telefone_consultorio" name="telefone_consultorio" class="input-field">
                  </div>
              </div>
          </div>

          <!-- SEÇÃO 3: ENDEREÇO -->
          <div class="section">
              <h2>3. Endereço</h2>
              <div class="input-group input-group-address">
                  <div class="form-group">
                      <label for="cep">CEP *</label>
                      <input type="text" id="cep" name="cep" required class="input-field" maxlength="9">
                  </div>
                  <div class="form-group col-span-full col-span-3-md">
                      <label for="logradouro">Logradouro *</label>
                      <input type="text" id="logradouro" name="logradouro" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="numero_residencial">Número *</label>
                      <input type="text" id="numero_residencial" name="numero_residencial" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="complemento">Complemento</label>
                      <input type="text" id="complemento" name="complemento" class="input-field">
                  </div>
                  <div class="form-group col-span-full col-span-2-md">
                      <label for="bairro">Bairro *</label>
                      <input type="text" id="bairro" name="bairro" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="cidade">Cidade *</label>
                      <input type="text" id="cidade" name="cidade" required class="input-field">
                  </div>
                  <div class="form-group">
                      <label for="estado">Estado (UF) *</label>
                      <select id="estado" name="estado" required class="input-field">
                          <option value="">Selecione</option>
                          <option value="AC">AC</option><option value="AL">AL</option>
                          <option value="AP">AP</option><option value="AM">AM</option>
                          <option value="BA">BA</option><option value="CE">CE</option>
                          <option value="DF">DF</option><option value="ES">ES</option>
                          <option value="GO">GO</option><option value="MA">MA</option>
                          <option value="MT">MT</option><option value="MS">MS</option>
                          <option value="MG">MG</option><option value="PA">PA</option>
                          <option value="PB">PB</option><option value="PR">PR</option>
                          <option value="PE">PE</option><option value="PI">PI</option>
                          <option value="RJ">RJ</option><option value="RN">RN</option>
                          <option value="RS">RS</option><option value="RO">RO</option>
                          <option value="RR">RR</option><option value="SC">SC</option>
                          <option value="SP" selected>SP</option>
                          <option value="SE">SE</option><option value="TO">TO</option>
                      </select>
                  </div>
              </div>
          </div>

          <!-- SEÇÃO 4: DISPONIBILIDADE -->
          <div class="section">
              <h2>4. Compromisso e Disponibilidade</h2>

              <div class="form-group" style="margin-bottom: 1.5rem;">
                  <label for="horas_semanais_disponiveis">Horas Semanais Disponíveis (Estimativa)</label>
                  <input type="number" id="horas_semanais_disponiveis" name="horas_semanais_disponiveis"
                         min="1" max="168" class="input-field col-span-1-half-md">
              </div>

              <div style="margin-bottom: 2rem;">
                  <label class="block-label" style="margin-bottom: 0.5rem;">Áreas de Atuação *</label>
                  <div class="checkbox-container" id="areas_atuacao">
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="1"><span>Psicologia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="2"><span>Odontologia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="3"><span>Psicopedagogia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="4"><span>Neuropsicopedagogia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="5"><span>Educação Física</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="6"><span>Fisioterapia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="7"><span>Medicina - Pneumologia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="8"><span>Nutrição</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="9"><span>Assistência Social</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="10"><span>Fonoaudiologia</span></label>
                      <label class="checkbox-label"><input type="checkbox" name="areas" value="11"><span>Outras / Apoio</span></label>
                  </div>
              </div>

              <div>
                  <label class="block-label" style="margin-bottom: 0.5rem;">Disponibilidade de Horários</label>
                  <div class="disponibilidade-adder">
                      <select id="dia_semana" class="input-field" style="flex: 1.5;">
                          <option value="">Selecione o dia</option>
                          <option value="Segunda-feira">Segunda-feira</option>
                          <option value="Terça-feira">Terça-feira</option>
                          <option value="Quarta-feira">Quarta-feira</option>
                          <option value="Quinta-feira">Quinta-feira</option>
                          <option value="Sexta-feira">Sexta-feira</option>
                          <option value="Sábado">Sábado</option>
                          <option value="Domingo">Domingo</option>
                      </select>
                      <input type="time" id="horario" class="input-field" style="flex: 1;">
                      <button type="button" id="btnAddDisponibilidade" class="btn"
                              style="background-color: var(--cor4); color: white; padding: 0.5rem 1rem;">
                          Adicionar
                      </button>
                  </div>
                  <ul id="listaDisponibilidades" style="list-style: none; padding: 0; margin-top: 1rem;"></ul>
              </div>
          </div>

          <button type="submit" class="btn btn-primary">Finalizar Cadastro</button>
      </form>
  </div>

  <script>
    let disponibilidadesData = [];

    // --- ADICIONAR DISPONIBILIDADE ---
    document.getElementById('btnAddDisponibilidade').addEventListener('click', () => {
        const diaSemanaSelect = document.getElementById('dia_semana');
        const horarioInput = document.getElementById('horario');

        const diaSemana = diaSemanaSelect.value;
        const horario = horarioInput.value;

        if (diaSemana && horario) {
            disponibilidadesData.push({ diaSemana: diaSemana, horario: horario });

            const lista = document.getElementById('listaDisponibilidades');
            const listItem = document.createElement('li');
            const textoDisplay = `✅ ${diaSemana}: ${horario}`;
            listItem.innerHTML = `
                <span>${textoDisplay}</span>
                <button type="button" onclick="removeDisponibilidade(this, '${diaSemana}', '${horario}')"
                    style="margin-left: 10px; background: none; border: none; color: #e74c3c; cursor: pointer;">
                    (Remover)
                </button>
            `;
            lista.appendChild(listItem);

            diaSemanaSelect.value = '';
            horarioInput.value = '';
        } else {
            alert('Por favor, selecione um dia e um horário.');
        }
    });

    function removeDisponibilidade(button, dia, horario) {
        const index = disponibilidadesData.findIndex(d => d.diaSemana === dia && d.horario === horario);
        if (index > -1) disponibilidadesData.splice(index, 1);
        button.closest('li').remove();
    }

    // --- COLETAR DADOS DO FORMULÁRIO ---
    function collectFormData(form) {
        const data = {
            nome: form.nome.value,
            profissao: form.profissao.value,
            registroConselho: form.registro_conselho.value || null,
            rg: form.rg.value,
            cpf: form.cpf.value.replace(/[^0-9]/g, ''),
            horasSemanaisDisponiveis: form.horas_semanais_disponiveis.value
                ? parseInt(form.horas_semanais_disponiveis.value) : null,
        endereco: {
            cep: form.cep.value.replace(/[^0-9]/g, ''),
            logradouro: form.logradouro.value,
            numero: form.numero_residencial.value.trim(),
            complemento: form.complemento.value || null,
            bairro: form.bairro.value,
            cidade: form.cidade.value,
            estado: "SP"
}
        };

        data.telefones = [{
            telefonePessoal: form.telefone_pessoal.value.replace(/[^0-9]/g, ''),
            telefoneResidencial: form.telefone_residencial.value.replace(/[^0-9]/g, '') || null,
            telefoneConsultorio: form.telefone_consultorio.value.replace(/[^0-9]/g, '') || null,
        }];

        data.disponibilidades = disponibilidadesData;

        data.areas = Array.from(document.querySelectorAll('input[name="areas"]:checked'))
                         .map(cb => parseInt(cb.value));

        return data;
    }

    // ---  ENVIAR PARA A API ---
    const API_URL = 'http://localhost:8080/api/voluntarios';

    document.getElementById('voluntarioForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const submitButton = form.querySelector('.btn-primary');
        const originalButtonText = submitButton.textContent;

        document.querySelectorAll('.error-message').forEach(el => el.remove());

        const requestData = collectFormData(form);
        console.log(requestData); //mod aqui

        if (requestData.areas.length === 0) {
            alert('Por favor, selecione pelo menos uma Área de Atuação.');
            return;
        }
        if (requestData.disponibilidades.length === 0) {
            alert('Por favor, adicione pelo menos um Horário de Disponibilidade.');
            return;
        }

        try {
            submitButton.textContent = 'Enviando...';
            submitButton.disabled = true;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            if (response.ok) {
                alert('✅ Cadastro realizado com sucesso! Em breve entraremos em contato.');
                form.reset();
                disponibilidadesData = [];
                document.getElementById('listaDisponibilidades').innerHTML = '';
            } else {
                const errorBody = await response.json();
                console.log("ERRO BACKEND:", errorBody);
                if (errorBody.status === 400 && errorBody.errors) {
                    const errorDiv = createErrorElement('Erro de Validação: Verifique os campos abaixo:');
                    const errorList = document.createElement('ul');
                    errorList.style.cssText = 'color:inherit; list-style:disc; margin-left:20px;';
                    errorBody.errors.forEach(err => {
                        const li = document.createElement('li');
                        li.textContent = err;
                        errorList.appendChild(li);
                    });
                    errorDiv.appendChild(errorList);
                    form.prepend(errorDiv);
                    alert('Falha no Cadastro. Verifique a lista de erros no topo do formulário.');
                } else if (errorBody.status === 409) {
                    form.prepend(createErrorElement(`Erro: ${errorBody.error}`));
                    alert(`Falha no Cadastro: ${errorBody.error}`);
                } else {
                    form.prepend(createErrorElement(`Erro da API: ${errorBody.error || 'Erro interno'}`));
                    alert(`Falha no Cadastro: ${errorBody.error || 'Erro interno'}`);
                }
            }
        } catch (error) {
            console.error('Erro de conexão:', error);
            alert('❌ Erro de conexão. Verifique se o servidor está rodando (porta 8080).');
        } finally {
            submitButton.textContent = originalButtonText;
            submitButton.disabled = false;
        }
    });

    function createErrorElement(text) {
        const div = document.createElement('div');
        div.className = 'error-message';
        div.style.cssText = 'padding:1rem; margin-bottom:1rem; background:#fde2e2; color:#c0392b; border-radius:0.5rem; border:1px solid #f99;';
        div.innerHTML = `<p style="font-weight:600;">${text}</p>`;
        return div;
    }

    const requiredFields = document.querySelectorAll('[required]');
    requiredFields.forEach(field => {
        field.addEventListener('invalid', () => field.setCustomValidity('Por favor, preencha este campo obrigatório.'));
        field.addEventListener('input', () => field.setCustomValidity(''));
    });
  </script>
</body>
</html>
